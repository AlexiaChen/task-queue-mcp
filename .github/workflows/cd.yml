name: CD - Docker Build & Push

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Optional: Also create a release binary when a tag is pushed
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build binaries
        run: |
          mkdir -p release
          # Define build targets: OS/ARCH
          declare -A targets=(
            ["linux-amd64"]="linux amd64"
            ["linux-arm64"]="linux arm64"
            ["darwin-amd64"]="darwin amd64"
            ["darwin-arm64"]="darwin arm64"
            ["windows-amd64"]="windows amd64"
          )
          for target in "${!targets[@]}"; do
            read -r os arch <<< "${targets[$target]}"
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            echo "Building $target..."
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -ldflags="-s -w" \
              -o "release/issue-kanban-mcp-${target}${ext}" ./cmd/server
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -ldflags="-s -w" \
              -o "release/issue-kanban-tui-${target}${ext}" ./cmd/tui
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -ldflags="-s -w" \
              -o "release/issue-kanban-cli-${target}${ext}" ./cmd/cli
          done
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
